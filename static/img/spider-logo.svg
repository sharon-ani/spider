<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <radialGradient id="bodyGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00d9ff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#8a2be2" stop-opacity="1"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Body -->
  <ellipse cx="50" cy="50" rx="16" ry="20" fill="url(#bodyGrad)" filter="url(#glow)" opacity="0.95"/>
  <!-- Head -->
  <circle cx="50" cy="30" r="9" fill="#00d9ff" filter="url(#glow)" opacity="0.9"/>
  <!-- Eyes -->
  <circle cx="46" cy="28" r="2.5" fill="#ff007f" filter="url(#glow)"/>
  <circle cx="54" cy="28" r="2.5" fill="#ff007f" filter="url(#glow)"/>
  <!-- Eye glow -->
  <circle cx="46" cy="28" r="1.2" fill="#ffffff" opacity="0.8"/>
  <circle cx="54" cy="28" r="1.2" fill="#ffffff" opacity="0.8"/>

  <!-- Left legs (top to bottom) -->
  <line x1="34" y1="40" x2="14" y2="28" stroke="#00d9ff" stroke-width="2" stroke-linecap="round" filter="url(#glow)" opacity="0.8"/>
  <line x1="34" y1="48" x2="10" y2="46" stroke="#00d9ff" stroke-width="2" stroke-linecap="round" filter="url(#glow)" opacity="0.8"/>
  <line x1="34" y1="56" x2="12" y2="64" stroke="#00d9ff" stroke-width="2" stroke-linecap="round" filter="url(#glow)" opacity="0.8"/>
  <line x1="34" y1="62" x2="16" y2="76" stroke="#00d9ff" stroke-width="2" stroke-linecap="round" filter="url(#glow)" opacity="0.7"/>

  <!-- Right legs -->
  <line x1="66" y1="40" x2="86" y2="28" stroke="#8a2be2" stroke-width="2" stroke-linecap="round" filter="url(#glow)" opacity="0.8"/>
  <line x1="66" y1="48" x2="90" y2="46" stroke="#8a2be2" stroke-width="2" stroke-linecap="round" filter="url(#glow)" opacity="0.8"/>
  <line x1="66" y1="56" x2="88" y2="64" stroke="#8a2be2" stroke-width="2" stroke-linecap="round" filter="url(#glow)" opacity="0.8"/>
  <line x1="66" y1="62" x2="84" y2="76" stroke="#8a2be2" stroke-width="2" stroke-linecap="round" filter="url(#glow)" opacity="0.7"/>

  <!-- Web strands (subtle) -->
  <line x1="50" y1="10" x2="50" y2="22" stroke="#00d9ff" stroke-width="1" stroke-dasharray="2,2" opacity="0.4"/>
</svg>
