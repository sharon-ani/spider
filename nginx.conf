# SPIDER — Nginx Configuration
# Place at: /etc/nginx/sites-available/spider
# Then: sudo ln -s /etc/nginx/sites-available/spider /etc/nginx/sites-enabled/
# Then: sudo nginx -t && sudo systemctl reload nginx

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=spider_api:10m rate=30r/m;
limit_req_zone $binary_remote_addr zone=spider_general:10m rate=60r/m;

# Upstream Flask/Gunicorn
upstream spider_app {
    server spider:5000;
    keepalive 32;
}

# ─── HTTP Main Server (Ready for Local & Production) ──────
server {
    listen 80;
    listen [::]:80;
    server_name localhost yourdomain.com www.yourdomain.com;

    # Allow Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # ── Security Headers ──
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── Logging ──
    access_log /var/log/nginx/spider.access.log combined;
    error_log  /var/log/nginx/spider.error.log warn;

    # ── Client Settings ──
    client_max_body_size 10M;
    client_body_timeout 30s;
    client_header_timeout 30s;

    # ── Static Files (served directly by Nginx — fast!) ──
    location /static/ {
        alias /opt/spider/static/;
        expires 7d;
        add_header Cache-Control "public, no-transform";
        access_log off;
        gzip on;
        gzip_types text/css application/javascript image/svg+xml;
    }

    # ── API Endpoints (rate limited) ──
    location /api/ {
        limit_req zone=spider_api burst=20 nodelay;
        limit_req_status 429;

        proxy_pass http://spider_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    # ── SSE Stream (long-lived connection) ──
    location /api/stream {
        proxy_pass http://spider_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 600s;
        chunked_transfer_encoding on;
    }

    # ── WebSocket (SocketIO) ──
    location /socket.io/ {
        proxy_pass http://spider_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ── All Other Requests ──
    location / {
        limit_req zone=spider_general burst=30 nodelay;

        proxy_pass http://spider_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}

