{% extends "base.html" %}
{% block content %}

<div class="page-header" data-aos="fade-down">
  <div class="page-title"><i class="fas fa-broadcast-tower"></i><span class="font-cyber">LIVE ATTACK FEED</span></div>
  <div class="d-flex align-center gap-3">
    <div class="live-indicator"><div class="live-dot"></div> REAL-TIME</div>
    <button class="btn-cyber btn-cyber-outline fs-12" id="pauseBtn" onclick="togglePause()">
      <i class="fas fa-pause" id="pauseIcon"></i> <span id="pauseText">Pause</span>
    </button>
    <a href="/reports/export/csv" class="btn-cyber btn-cyber-green fs-12">
      <i class="fas fa-download"></i> Export CSV
    </a>
  </div>
</div>

<!-- Stats Row -->
<div class="stats-grid stagger" data-aos="fade-up" style="grid-template-columns:repeat(auto-fit,minmax(160px,1fr))">
  <div class="stat-card blue"><div class="corner-glow"></div><div class="stat-icon"><i class="fas fa-network-wired"></i></div><div class="stat-label">Total Attempts</div><div class="stat-value" id="statTotal">—</div></div>
  <div class="stat-card red"><div class="corner-glow"></div><div class="stat-icon"><i class="fas fa-times-circle"></i></div><div class="stat-label">Failed</div><div class="stat-value" id="statFailed">—</div></div>
  <div class="stat-card green"><div class="corner-glow"></div><div class="stat-icon"><i class="fas fa-check-circle"></i></div><div class="stat-label">Success</div><div class="stat-value" id="statSuccess">—</div></div>
  <div class="stat-card orange"><div class="corner-glow"></div><div class="stat-icon"><i class="fas fa-bolt"></i></div><div class="stat-label">Brute Force</div><div class="stat-value" id="statBrute">—</div></div>
  <div class="stat-card purple"><div class="corner-glow"></div><div class="stat-icon"><i class="fas fa-user-shield"></i></div><div class="stat-label">Root Attempts</div><div class="stat-value" id="statRoot">—</div></div>
</div>

<!-- Filters -->
<div class="glass-card mb-4" data-aos="fade-up">
  <div class="d-flex align-center gap-3" style="flex-wrap:wrap;">
    <div style="position:relative;flex:1;min-width:200px;">
      <i class="fas fa-search" style="position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:12px;"></i>
      <input type="text" class="input-cyber" id="feedSearch" placeholder="Search IP, country, username..." style="padding-left:32px;"/>
    </div>
    <select class="input-cyber" id="filterStatus" style="max-width:140px;">
      <option value="">All Status</option>
      <option value="failed">Failed</option>
      <option value="success">Success</option>
    </select>
    <select class="input-cyber" id="filterType" style="max-width:160px;">
      <option value="">All Event Types</option>
      <option value="login_failed">Login Failed</option>
      <option value="login_success">Login Success</option>
      <option value="brute_force">Brute Force</option>
      <option value="root_login">Root Login</option>
      <option value="invalid_user">Invalid User</option>
    </select>
    <button class="btn-cyber btn-cyber-primary" onclick="applyFilters()"><i class="fas fa-filter"></i> Filter</button>
    <button class="btn-cyber btn-cyber-outline" onclick="resetFilters()"><i class="fas fa-times"></i> Reset</button>
  </div>
</div>

<!-- Main Feed Table -->
<div class="glass-card" data-aos="fade-up" data-aos-delay="100">
  <div class="section-header">
    <div class="section-title"><i class="fas fa-list"></i> SSH Attack Log</div>
    <div class="d-flex align-center gap-2">
      <div class="live-indicator" id="feedLiveStatus"><div class="live-dot"></div> STREAMING</div>
      <span class="fs-11" style="color:var(--muted)" id="feedRowCount"></span>
    </div>
  </div>
  <div style="overflow-x:auto;">
    <table class="table-cyber display" id="attackFeedTable" style="width:100%">
      <thead>
        <tr>
          <th>Timestamp</th>
          <th>Source IP</th>
          <th>Country</th>
          <th>Username</th>
          <th>Port</th>
          <th>Status</th>
          <th>Event Type</th>
          <th>Flags</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>
</div>

{% endblock %}
{% block scripts %}
<script>
let paused = false;
let attackTable = null;
let allData = [];

function togglePause() {
  paused = !paused;
  document.getElementById('pauseIcon').className = paused ? 'fas fa-play' : 'fas fa-pause';
  document.getElementById('pauseText').textContent = paused ? 'Resume' : 'Pause';
  document.getElementById('feedLiveStatus').innerHTML = paused
    ? '<i class="fas fa-pause" style="color:var(--orange)"></i> <span style="color:var(--orange)">PAUSED</span>'
    : '<div class="live-dot"></div> STREAMING';
}

async function loadStats() {
  const d = await SPIDER.fetchJSON('/api/stats');
  if (!d) return;
  SPIDER.animateCounter(document.getElementById('statTotal'),   d.total_attempts);
  SPIDER.animateCounter(document.getElementById('statFailed'),  d.failed_logins);
  SPIDER.animateCounter(document.getElementById('statSuccess'), d.success_logins);
  SPIDER.animateCounter(document.getElementById('statBrute'),   d.brute_force_attacks);
  SPIDER.animateCounter(document.getElementById('statRoot'),    d.root_attempts);
}

async function loadFeed() {
  const search  = document.getElementById('feedSearch').value;
  const status  = document.getElementById('filterStatus').value;
  const etype   = document.getElementById('filterType').value;
  let url = `/api/attacks?per_page=200`;
  if (status) url += `&status=${status}`;
  if (etype)  url += `&event_type=${etype}`;
  if (search) url += `&search=${encodeURIComponent(search)}`;

  const d = await SPIDER.fetchJSON(url);
  if (!d) return;
  allData = d.data || [];
  document.getElementById('feedRowCount').textContent = `${allData.length.toLocaleString()} records`;
  renderTable(allData);
}

function renderTable(data) {
  if (attackTable) { attackTable.destroy(); attackTable = null; }
  const tbody = document.querySelector('#attackFeedTable tbody');
  tbody.innerHTML = data.map(a => `
    <tr class="${a.is_brute_force ? 'danger-pulse' : ''}">
      <td class="font-mono fs-12" style="color:var(--muted);white-space:nowrap;">${a.timestamp}</td>
      <td><span class="ip-badge">${a.ip}</span></td>
      <td style="white-space:nowrap;">${SPIDER.flagEmoji(a.country_code)} ${a.country}</td>
      <td style="color:var(--white);font-family:var(--font-mono)">${a.username}</td>
      <td class="fs-12" style="color:var(--muted)">${a.port}</td>
      <td>${SPIDER.statusBadge(a.status)}</td>
      <td>${SPIDER.eventBadge(a.event_type)}</td>
      <td>
        ${a.is_root ? '<span class="badge-cyber badge-root" style="font-size:10px;padding:2px 6px;"><i class="fas fa-user-shield"></i> ROOT</span>' : ''}
        ${a.is_brute_force ? '<span class="badge-cyber badge-critical" style="font-size:10px;padding:2px 6px;"><i class="fas fa-bolt"></i> BF</span>' : ''}
      </td>
    </tr>
  `).join('') || '<tr><td colspan="8" style="text-align:center;padding:30px;color:var(--muted)">No records found</td></tr>';

  attackTable = $('#attackFeedTable').DataTable({
    destroy: true,
    pageLength: 50,
    order: [[0,'desc']],
    responsive: true,
    language: { search: '', searchPlaceholder: 'Filter rows...', lengthMenu: 'Show _MENU_' }
  });
}

function applyFilters() { loadFeed(); }
function resetFilters() {
  document.getElementById('feedSearch').value = '';
  document.getElementById('filterStatus').value = '';
  document.getElementById('filterType').value = '';
  loadFeed();
}

// Live SSE injection (if not paused)
const origInject = RealtimeFeed.injectFeedRow.bind(RealtimeFeed);
RealtimeFeed.injectFeedRow = function(attack) {
  if (!paused) origInject(attack);
};

// Init
(async () => {
  RealtimeFeed.init(null);
  await Promise.all([loadStats(), loadFeed()]);
  setInterval(() => { if (!paused) loadFeed(); }, 15000);
  setInterval(loadStats, 8000);
})();
</script>
{% endblock %}
