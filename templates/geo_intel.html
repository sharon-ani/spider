{% extends "base.html" %}
{% block content %}

<div class="page-header" data-aos="fade-down">
  <div class="page-title"><i class="fas fa-globe-americas"></i><span class="font-cyber">GEO INTELLIGENCE</span></div>
  <div class="d-flex align-center gap-2">
    <a href="/analytics" class="btn-cyber btn-cyber-outline fs-12"><i class="fas fa-chart-pie"></i> Analytics</a>
  </div>
</div>

<div class="content-grid" data-aos="fade-up">

  <!-- Country Doughnut -->
  <div class="glass-card">
    <div class="section-title mb-3"><i class="fas fa-flag"></i> Attack Distribution by Country</div>
    <div class="chart-wrap" style="height:300px;">
      <canvas id="countryChart"></canvas>
    </div>
  </div>

  <!-- Top Countries Table -->
  <div class="glass-card">
    <div class="section-header">
      <div class="section-title"><i class="fas fa-list-ol"></i> Top Attacking Countries</div>
    </div>
    <div id="geoCountriesWrap" class="scroll-box" style="max-height:320px;">
      <div style="text-align:center;padding:30px;color:var(--muted);"><div class="spinner-cyber" style="margin:0 auto;"></div></div>
    </div>
  </div>
</div>

<!-- Attack Origin Map (placeholder with lat/lon points) -->
<div class="glass-card mb-4" data-aos="fade-up" data-aos-delay="100">
  <div class="section-header">
    <div class="section-title"><i class="fas fa-map-marked-alt"></i> Attack Origin Map</div>
    <span class="badge-cyber badge-info">GeoIP — ip-api.com</span>
  </div>
  <!-- SVG World Map with attack points -->
  <div id="attackMapWrap" style="min-height:300px;background:rgba(0,217,255,0.02);border:1px solid var(--border);border-radius:var(--radius);padding:20px;position:relative;overflow:hidden;">
    <div style="text-align:center;padding:40px;color:var(--muted);">
      <i class="fas fa-globe" style="font-size:3rem;color:var(--cyber-blue);opacity:0.3;display:block;margin-bottom:12px;"></i>
      <div style="font-size:13px;">Attack origin map — <span style="color:var(--cyber-blue)">Geo data loaded below</span></div>
    </div>
    <canvas id="mapCanvas" style="position:absolute;inset:0;width:100%;height:100%;opacity:0.6;pointer-events:none;"></canvas>
  </div>
</div>

<!-- ISP / ASN Intelligence -->
<div class="content-grid" data-aos="fade-up" data-aos-delay="150">
  <div class="glass-card">
    <div class="section-title mb-3"><i class="fas fa-building"></i> Top ISPs / ASNs</div>
    <div id="ispWrap" class="scroll-box" style="max-height:280px;">
      <div style="text-align:center;padding:30px;color:var(--muted);"><div class="spinner-cyber" style="margin:0 auto;"></div></div>
    </div>
  </div>
  <div class="glass-card">
    <div class="section-title mb-3"><i class="fas fa-city"></i> Top Attacking Cities</div>
    <div id="cityWrap" class="scroll-box" style="max-height:280px;">
      <div style="text-align:center;padding:30px;color:var(--muted);"><div class="spinner-cyber" style="margin:0 auto;"></div></div>
    </div>
  </div>
</div>

{% endblock %}
{% block scripts %}
<script>
(async () => {
  const geo = await SPIDER.fetchJSON('/api/geo');
  if (!geo) return;

  SpiderCharts.initCountryChart('countryChart', geo.top_countries || []);
  renderCountries(geo.top_countries || []);
  renderMapDots(geo.attack_map || []);

  // ISP / City breakdown from attack map data
  const mapData = geo.attack_map || [];
  renderISPs(mapData);
})();

function renderCountries(countries) {
  const wrap = document.getElementById('geoCountriesWrap');
  const max = countries[0]?.count || 1;
  wrap.innerHTML = `<table class="table-cyber"><thead><tr><th>#</th><th>Country</th><th>Attacks</th><th>Share</th></tr></thead><tbody>` +
    countries.map((c,i) => `<tr>
      <td style="color:var(--muted);font-size:11px;">${i+1}</td>
      <td>${SPIDER.flagEmoji(c.country_code)} <span style="color:var(--white)">${c.country}</span></td>
      <td style="font-family:var(--font-cyber);color:var(--cyber-blue)">${c.count.toLocaleString()}</td>
      <td style="min-width:100px;">
        <div class="progress-cyber"><div class="progress-fill blue" style="width:${(c.count/max*100).toFixed(0)}%"></div></div>
        <span style="font-size:10px;color:var(--muted)">${(c.count/max*100).toFixed(1)}%</span>
      </td>
    </tr>`).join('') + '</tbody></table>';
}

function renderMapDots(mapData) {
  const canvas = document.getElementById('mapCanvas');
  const wrap = document.getElementById('attackMapWrap');
  canvas.width  = wrap.offsetWidth;
  canvas.height = wrap.offsetHeight;
  const ctx = canvas.getContext('2d');

  mapData.forEach(d => {
    if (!d.lat || !d.lon) return;
    // Simple Mercator projection
    const x = ((d.lon + 180) / 360) * canvas.width;
    const y = ((90 - d.lat) / 180) * canvas.height;
    const r = Math.min(12, Math.max(4, Math.log(d.count + 1) * 2));

    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255, 34, 68, 0.6)';
    ctx.fill();
    ctx.beginPath();
    ctx.arc(x, y, r * 1.8, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(255, 34, 68, 0.25)';
    ctx.lineWidth = 1;
    ctx.stroke();
  });
}

function renderISPs(mapData) {
  // Extract from top IPs data
  const wrap = document.getElementById('ispWrap');
  wrap.innerHTML = `<div style="padding:12px 0;color:var(--muted);font-size:12px;text-align:center;">
    <i class="fas fa-info-circle" style="color:var(--cyber-blue);"></i>&nbsp;
    ISP data enriched via GeoIP on detected IPs
    <br/><br/>
    <div style="font-size:11px;opacity:0.7;">Total unique IPs tracked: <span style="color:var(--cyber-blue)">${mapData.length}</span></div>
  </div>
  ${mapData.slice(0,8).map(d => `
    <div style="padding:8px;border-bottom:1px solid rgba(255,255,255,0.04);">
      <span class="ip-badge">${d.ip}</span>
      <span style="float:right;color:var(--orange);font-size:11px;font-family:var(--font-mono)">${d.count} hits</span>
      <div style="font-size:11px;color:var(--muted);margin-top:2px;">${SPIDER.flagEmoji(d.country?.slice(0,2)||'XX')} ${d.country || 'Unknown'}</div>
    </div>
  `).join('')}`;

  const cWrap = document.getElementById('cityWrap');
  const cities = {};
  mapData.forEach(d => {
    if (d.country) cities[d.country] = (cities[d.country]||0) + d.count;
  });
  const sortedCities = Object.entries(cities).sort((a,b) => b[1]-a[1]).slice(0,10);
  const maxC = sortedCities[0]?.[1] || 1;
  cWrap.innerHTML = sortedCities.map(([city, count]) => `
    <div style="padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.04);">
      <div class="d-flex justify-between fs-12">
        <span style="color:var(--white)">${city}</span>
        <span style="color:var(--cyber-blue);font-family:var(--font-mono)">${count.toLocaleString()}</span>
      </div>
      <div class="progress-cyber mt-1">
        <div class="progress-fill blue" style="width:${(count/maxC*100).toFixed(0)}%"></div>
      </div>
    </div>
  `).join('');
}
</script>
{% endblock %}
