version: '3.9'

services:

  # ─── SPIDER Application ─────────────────────────────────
  spider:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: spider_app
    restart: unless-stopped
    env_file: .env
    environment:
      - DATABASE_URL=postgresql://spider_user:${POSTGRES_PASSWORD}@db:5432/spider_db
      - DEMO_MODE=${DEMO_MODE:-false}
      - FLASK_ENV=production
    volumes:
      # Mount real SSH log for monitoring
      - /var/log/auth.log:/var/log/auth.log:ro
      # Cowrie honeypot logs
      - /home/cowrie/cowrie/var/log/cowrie:/cowrie/logs:ro
      # Persist SQLite DB (if not using PostgreSQL)
      - spider_data:/app/db
      # App logs
      - spider_logs:/var/log/spider
    ports:
      - "127.0.0.1:5000:5000"   # Only bind to localhost (Nginx fronts it)
    depends_on:
      db:
        condition: service_healthy
    networks:
      - spider_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/stats"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ─── PostgreSQL Database ──────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: spider_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: spider_db
      POSTGRES_USER: spider_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_strong_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - spider_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spider_user -d spider_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    # Don't expose DB port to host (internal only)

  # ─── Nginx Reverse Proxy ──────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: spider_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
      - "8443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./static:/opt/spider/static:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - spider
    networks:
      - spider_net

  # ─── Certbot (SSL Auto-Renewal) ───────────────────────
  certbot:
    image: certbot/certbot
    container_name: spider_certbot
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    entrypoint: >
      /bin/sh -c "trap exit TERM;
      while :; do
        certbot renew --webroot --webroot-path=/var/www/certbot --quiet;
        sleep 12h & wait $${!};
      done"

# ─── Volumes ─────────────────────────────────────────────
volumes:
  postgres_data:
  spider_data:
  spider_logs:
  nginx_logs:
  certbot_www:

# ─── Networks ────────────────────────────────────────────
networks:
  spider_net:
    driver: bridge
